name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          mkdir -p dist
          GIT_COMMIT="$(git rev-parse HEAD)"
          GIT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          BUILD_DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          OUTPUT="dist/opencenter-${VERSION}-${GOOS}-${GOARCH}"

          go build -trimpath -ldflags "\
            -X main.version=${VERSION} \
            -X main.gitCommit=${GIT_COMMIT} \
            -X main.gitBranch=${GIT_BRANCH} \
            -X main.gitTag=${VERSION} \
            -X main.buildDate=${BUILD_DATE}" \
            -o "${OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencenter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/opencenter-*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum opencenter-* | sort > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts with cosign keyless
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob
          for artifact in dist/opencenter-* dist/checksums.txt; do
            cosign sign-blob \
              --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "${artifact}"
          done

      - name: Install syft
        run: go install github.com/anchore/syft/cmd/syft@latest

      - name: Generate SBOM
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/syft" dir:dist -o spdx-json=dist/opencenter.spdx.json

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
