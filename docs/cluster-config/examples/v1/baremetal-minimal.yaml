# v1 Cluster Configuration: Baremetal Minimal
#
# Minimal v1 configuration for deploying Kubernetes on bare metal infrastructure
# using Kubespray.
#
# Note: v1 schema is deprecated. Migrate to v2 using:
#   opencenter cluster migrate-config --input baremetal-minimal.yaml --output baremetal-minimal-v2.yaml

opencenter:
  cluster:
    cluster_name: baremetal-cluster
    organization: my-org
    env: dev
    region: datacenter1
    base_domain: example.com
    cluster_fqdn: baremetal-cluster.example.com
    admin_email: admin@example.com
    
    # SSH Configuration
    ssh:
      user: ubuntu
      key_path: "~/.ssh/baremetal-cluster-key"
      authorized_keys:
        - "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... user@host"
    
    # Networking Configuration (v1 location)
    networking:
      subnet_nodes: "192.168.1.0/24"
      allocation_pool_start: "192.168.1.10"
      allocation_pool_end: "192.168.1.100"
      vrrp_ip: ""
      vrrp_enabled: false
      use_octavia: false
      loadbalancer_provider: "metallb"
      use_designate: false
      dns_zone_name: "example.com"
      dns_nameservers:
        - "8.8.8.8"
        - "8.8.4.4"
      ntp_servers:
        - "time.google.com"
    
    # Kubernetes Configuration
    kubernetes:
      version: "1.31.4"
      api_port: 6443
      kube_vip_enabled: false
      subnet_pods: "10.233.64.0/18"
      subnet_services: "10.233.0.0/18"
      
      # CNI Plugin
      network_plugin:
        calico:
          enabled: true
          version: "v3.27.0"
          cni_iface: "eth0"
          calico_interface_autodetect: "interface"
      
      # Security
      security:
        pod_security_policy_enabled: false
        audit_log_enabled: false
      
      # OIDC
      oidc:
        enabled: false
  
  # Infrastructure Configuration
  infrastructure:
    provider: baremetal
    os_version: "ubuntu-22.04"
    
    # Compute
    compute:
      flavor_bastion: "baremetal-small"
      flavor_master: "baremetal-medium"
      flavor_worker: "baremetal-large"
      master_count: 1
      worker_count: 2
    
    # Provider-Specific Configuration
    cloud:
      baremetal:
        nodes:
          - name: master-01
            ip: "192.168.1.10"
            role: master
            mac_address: "00:11:22:33:44:55"
          - name: worker-01
            ip: "192.168.1.11"
            role: worker
            mac_address: "00:11:22:33:44:66"
          - name: worker-02
            ip: "192.168.1.12"
            role: worker
            mac_address: "00:11:22:33:44:77"
  
  # Storage Configuration (v1 location)
  storage:
    default_storage_class: "local-path"
    worker_volume_size: 100
    worker_volume_destination_type: "local"
    worker_volume_source_type: "image"
    worker_volume_type: "local"
    worker_volume_delete_on_termination: false
  
  # Deployment Configuration (v1 location)
  deployment:
    method: kubespray
    kubespray:
      version: "v2.29.1"
      modules:
        metallb:
          enabled: true
  
  # Services Configuration
  services:
    fluxcd:
      enabled: false
    
    cert-manager:
      enabled: false
    
    metallb:
      enabled: true
      version: "v0.14.0"
      namespace: "metallb-system"
      address_pools:
        - name: default
          protocol: layer2
          addresses:
            - "192.168.1.200-192.168.1.210"

# GitOps Configuration
gitops:
  enabled: false

# OpenTofu Backend
opentofu:
  enabled: false

# Secrets Configuration
secrets:
  sops:
    enabled: false
