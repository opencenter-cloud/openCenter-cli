# v2 Cluster Configuration: Baremetal Minimal
#
# Minimal v2 configuration for deploying Kubernetes on bare metal infrastructure
# using Kubespray.
#
# Key Features:
# - Single control plane node (non-HA)
# - 2 worker nodes
# - Calico CNI with interface detection
# - Local storage (no cloud CSI)
# - MetalLB for LoadBalancer services
# - Static node inventory with IP/MAC addresses
# - No GitOps/SOPS (minimal setup)
#
# To migrate from v1:
#   opencenter cluster migrate-config --input baremetal-v1.yaml --output baremetal-v2.yaml

schema_version: "2.0"

opencenter:
  # Meta Domain: Cluster identity
  meta:
    name: baremetal-cluster
    organization: my-org
    env: dev
    region: datacenter1
    status: active

  # Cluster Domain: Kubernetes configuration
  cluster:
    cluster_name: baremetal-cluster
    base_domain: example.com
    cluster_fqdn: baremetal-cluster.example.com
    admin_email: admin@example.com
    
    kubernetes:
      version: "1.31.4"
      api_port: 6443
      kube_vip_enabled: false
      subnet_pods: "10.233.64.0/18"
      subnet_services: "10.233.0.0/18"
      
      network_plugin:
        calico:
          enabled: true
          version: "v3.27.0"
          cni_iface: "eth0"
          calico_interface_autodetect: "interface"
        cilium:
          enabled: false
        kube-ovn:
          enabled: false
      
      storage_plugin:
        cinder_csi:
          enabled: false
        aws_ebs_csi:
          enabled: false
        vsphere_csi:
          enabled: false
      
      security:
        pod_security_standard: "baseline"
        audit_logging_enabled: false
      
      oidc:
        enabled: false

  # Infrastructure Domain: Bare metal resources
  infrastructure:
    provider: baremetal
    os_version: "ubuntu-22.04"
    
    ssh:
      user: ubuntu
      key_path: "~/.ssh/baremetal-cluster-key"
      authorized_keys:
        - "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... user@host"
    
    networking:
      subnet_nodes: "192.168.1.0/24"
      allocation_pool_start: "192.168.1.10"
      allocation_pool_end: "192.168.1.100"
      vrrp_ip: ""
      vrrp_enabled: false
      use_octavia: false
      loadbalancer_provider: "metallb"
      use_designate: false
      dns_zone_name: "example.com"
      dns_nameservers:
        - "8.8.8.8"
        - "8.8.4.4"
      ntp_servers:
        - "time.google.com"
      
      security:
        firewall_enabled: false
        allowed_cidr_blocks:
          - "192.168.1.0/24"
      
      vlan:
        enabled: false
    
    compute:
      flavor_bastion: "baremetal-small"
      flavor_master: "baremetal-medium"
      flavor_worker: "baremetal-large"
      master_count: 1
      worker_count: 2
    
    storage:
      default_storage_class: "local-path"
      worker_volume_size: 100
      worker_volume_destination_type: "local"
      worker_volume_source_type: "image"
      worker_volume_type: "local"
      worker_volume_delete_on_termination: false
    
    cloud:
      baremetal:
        nodes:
          - name: master-01
            ip: "192.168.1.10"
            role: master
            mac_address: "00:11:22:33:44:55"
          - name: worker-01
            ip: "192.168.1.11"
            role: worker
            mac_address: "00:11:22:33:44:66"
          - name: worker-02
            ip: "192.168.1.12"
            role: worker
            mac_address: "00:11:22:33:44:77"

  # Services Domain: Minimal platform services
  services:
    fluxcd:
      enabled: false
    
    cert-manager:
      enabled: false
    
    metallb:
      enabled: true
      version: "v0.14.0"
      namespace: "metallb-system"
      address_pools:
        - name: default
          protocol: layer2
          addresses:
            - "192.168.1.200-192.168.1.210"

# Deployment Configuration
deployment:
  auto_deploy: false
  method: kubespray
  
  kubespray:
    version: "v2.29.1"
    modules:
      metallb:
        enabled: true

# GitOps Configuration
gitops:
  enabled: false

# OpenTofu Backend
opentofu:
  enabled: false

# Secrets Configuration
secrets:
  sops:
    enabled: false
