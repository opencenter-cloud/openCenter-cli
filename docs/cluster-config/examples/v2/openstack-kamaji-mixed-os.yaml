# v2 Cluster Configuration Example: OpenStack + Kamaji with Mixed OS Workers
#
# This example demonstrates a Kubernetes cluster with a hosted control plane
# using Kamaji, deployed on OpenStack with mixed OS worker pools (Ubuntu,
# Windows, and Talos Linux).
#
# Key Features:
# - Hosted control plane with Kamaji (3 replicas)
# - Cluster API for declarative cluster management
# - Mixed OS worker pools (Ubuntu, Windows, Talos)
# - Cilium CNI for advanced networking
# - Cinder CSI for persistent storage
# - No traditional master nodes (control plane is hosted)

schema_version: "2.0"

opencenter:
  # Meta Domain: Cluster identity and organizational context
  meta:
    name: kamaji-mixed-cluster
    organization: acme-corp
    env: production
    region: sjc3
    status: active

  # Cluster Domain: Kubernetes-specific configuration
  cluster:
    cluster_name: kamaji-mixed-cluster
    base_domain: acme-corp.com
    cluster_fqdn: kamaji-mixed-cluster.acme-corp.com
    admin_email: k8s-admin@acme-corp.com
    
    kubernetes:
      version: "1.28.5"
      api_port: 6443
      kube_vip_enabled: false  # Not needed with Kamaji
      subnet_pods: "10.244.0.0/16"
      subnet_services: "10.96.0.0/12"
      
      # CNI Plugin Selection (Cilium for advanced features)
      network_plugin:
        cilium:
          enabled: true
          version: "v1.14.0"
          tunnel_mode: "vxlan"
          enable_hubble: true
          enable_network_policy: true
          enable_l7_proxy: true
      
      # CSI Plugin Selection (Cinder for OpenStack)
      storage_plugin:
        cinder_csi:
          enabled: true
          version: "v1.28.0"
      
      security:
        pod_security_policy_enabled: false
        audit_log_enabled: true
        encryption_at_rest_enabled: true
      
      oidc:
        enabled: true
        issuer_url: "https://keycloak.acme-corp.com/realms/kubernetes"
        client_id: "kubernetes"
        username_claim: "preferred_username"
        groups_claim: "groups"

  # Infrastructure Domain: Physical resources
  infrastructure:
    provider: openstack
    os_version: "ubuntu-22.04"  # Default OS for management
    
    # SSH Configuration
    ssh:
      user: ubuntu
      key_path: "~/.ssh/kamaji-mixed-cluster-sjc3"
      bastion_enabled: true
    
    # Networking Configuration
    networking:
      subnet_nodes: "10.2.128.0/22"
      allocation_pool_start: "10.2.128.10"
      allocation_pool_end: "10.2.131.254"
      vrrp_enabled: false  # Not needed with Kamaji
      use_octavia: true
      loadbalancer_provider: "octavia"
      use_designate: true
      dns_zone_name: "acme-corp.com"
      dns_nameservers:
        - "8.8.8.8"
        - "8.8.4.4"
      ntp_servers:
        - "time.google.com"
        - "time.cloudflare.com"
    
    # Compute Configuration
    compute:
      flavor_bastion: "m1.small"
      master_count: 0  # No traditional masters with Kamaji
      worker_count: 0  # Workers defined in deployment.kamaji.worker_pools
    
    # Storage Configuration
    storage:
      default_storage_class: "cinder-csi"
      worker_volume_size: 100
      worker_volume_destination_type: "volume"
      worker_volume_source_type: "image"
      worker_volume_type: "ssd"
      worker_volume_delete_on_termination: true
    
    # Provider-Specific Configuration (OpenStack)
    cloud:
      openstack:
        auth_url: "https://openstack.sjc3.acme-corp.com:5000/v3"
        project_name: "kubernetes-prod"
        domain_name: "Default"
        region: "sjc3"
        availability_zones:
          - "az1"
          - "az2"
          - "az3"
        network_name: "k8s-network"
        external_network_name: "public"
        image_id: "${secrets.openstack.ubuntu_2204_image_id}"
        flavor_validation_enabled: true

  # Services Domain: Platform workloads
  services:
    # FluxCD for GitOps
    fluxcd:
      enabled: true
      version: "v2.2.0"
      namespace: "flux-system"
    
    # Cert-Manager with Designate DNS
    cert-manager:
      enabled: true
      version: "v1.13.0"
      namespace: "cert-manager"
      dns_provider: "designate"
      designate_config:
        auth_url: "${infrastructure.cloud.openstack.auth_url}"
        region: "${infrastructure.cloud.openstack.region}"
    
    # Cinder CSI Driver
    cinder-csi:
      enabled: true
      version: "v1.28.0"
      namespace: "kube-system"
      storage_classes:
        - name: "cinder-csi"
          is_default: true
          volume_type: "ssd"
          reclaim_policy: "Delete"
    
    # Cilium CNI
    cilium:
      enabled: true
      version: "v1.14.0"
      namespace: "kube-system"
      hubble_ui_enabled: true
    
    # Monitoring Stack
    kube-prometheus-stack:
      enabled: true
      version: "v0.70.0"
      namespace: "monitoring"
      grafana_enabled: true
      prometheus_retention: "30d"

# Deployment Configuration: Kamaji hosted control plane
deployment:
  auto_deploy: true
  method: kamaji
  
  kamaji:
    enabled: true
    version: "v0.4.0"
    
    # Hosted Control Plane Configuration
    control_plane:
      replicas: 3  # Must be odd number for HA
      datastore: etcd
      
      # Etcd Configuration
      etcd:
        storage_class: "cinder-csi"
        storage_size: "10Gi"
        replicas: 3
      
      service_type: LoadBalancer
      api_server_port: 6443
      
      resources:
        api_server:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        controller_manager:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        scheduler:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
    
    # Cluster API Configuration
    cluster_api:
      version: "v1.6.0"
      providers:
        infrastructure: openstack
        bootstrap: kubeadm
        control_plane: kubeadm
      
      # OpenStack CAPI Provider Configuration
      openstack:
        cloud_name: "openstack"
        clouds_yaml_secret: "cloud-config"
        ca_cert_secret: "openstack-ca-cert"
    
    # Mixed OS Worker Pools
    worker_pools:
      # Ubuntu Worker Pool (General Purpose)
      - name: ubuntu-general
        os: ubuntu
        count: 5
        flavor: "m1.xlarge"
        image: "${secrets.openstack.ubuntu_2204_image_id}"
        bootstrap_provider: kubeadm
        
        boot_volume:
          size: 100
          type: "ssd"
          delete_on_termination: true
        
        additional_volumes:
          - device_name: "/dev/vdb"
            size: 500
            type: "ssd"
            delete_on_termination: true
        
        labels:
          node-role.kubernetes.io/worker: ""
          workload-type: "general"
          os: "ubuntu"
        
        taints: []
        
        autoscaling:
          enabled: true
          min_replicas: 3
          max_replicas: 10
          target_cpu_utilization: 70
      
      # Windows Worker Pool (Windows Workloads)
      - name: windows-apps
        os: windows
        count: 3
        flavor: "m1.xlarge"
        image: "${secrets.openstack.windows_2022_image_id}"
        bootstrap_provider: kubeadm
        
        boot_volume:
          size: 150
          type: "ssd"
          delete_on_termination: true
        
        labels:
          node-role.kubernetes.io/worker: ""
          workload-type: "windows"
          os: "windows"
          kubernetes.io/os: "windows"
        
        taints:
          - key: "os"
            value: "windows"
            effect: "NoSchedule"
        
        autoscaling:
          enabled: false
      
      # Talos Worker Pool (High Security Workloads)
      - name: talos-secure
        os: talos
        count: 3
        flavor: "m1.large"
        image: "${secrets.openstack.talos_1_6_image_id}"
        bootstrap_provider: talos
        talos_version: "v1.6.0"
        
        boot_volume:
          size: 50
          type: "ssd"
          delete_on_termination: true
        
        additional_volumes:
          - device_name: "/dev/vdb"
            size: 200
            type: "ssd"
            delete_on_termination: true
        
        labels:
          node-role.kubernetes.io/worker: ""
          workload-type: "secure"
          os: "talos"
        
        taints:
          - key: "workload"
            value: "secure"
            effect: "NoSchedule"
        
        autoscaling:
          enabled: true
          min_replicas: 2
          max_replicas: 6
          target_cpu_utilization: 60
        
        # Talos-specific configuration
        talos_config:
          install_disk: "/dev/vda"
          kernel_args:
            - "console=ttyS0"
            - "talos.platform=openstack"
          sysctls:
            net.ipv4.ip_forward: "1"
            net.bridge.bridge-nf-call-iptables: "1"

# GitOps Configuration
gitops:
  enabled: true
  git_url: "git@github.com:acme-corp/k8s-gitops.git"
  git_branch: "main"
  base_repo_url: "https://github.com/rackerlabs/openCenter-gitops-base.git"
  base_repo_release: "v1.0.0"
  flux_interval: "5m"
  flux_prune: true

# OpenTofu Backend Configuration
opentofu:
  enabled: true
  backend_type: "s3"
  s3_config:
    bucket: "acme-corp-terraform-state"
    key: "kubernetes/kamaji-mixed-cluster/terraform.tfstate"
    region: "us-east-1"
    encrypt: true

# Secrets Configuration
secrets:
  sops:
    enabled: true
    age_key_file: "~/.config/opencenter/clusters/acme-corp/secrets/age/kamaji-mixed-cluster-key.txt"
  
  # Global infrastructure secrets
  openstack:
    username: "ENC[AES256_GCM,data:...]"
    password: "ENC[AES256_GCM,data:...]"
    ubuntu_2204_image_id: "ENC[AES256_GCM,data:...]"
    windows_2022_image_id: "ENC[AES256_GCM,data:...]"
    talos_1_6_image_id: "ENC[AES256_GCM,data:...]"
  
  # Service-specific secrets
  cert_manager:
    designate_username: "ENC[AES256_GCM,data:...]"
    designate_password: "ENC[AES256_GCM,data:...]"
