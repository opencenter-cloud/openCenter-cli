# v2 Cluster Configuration Example: OpenStack + Kubespray
#
# This example demonstrates a production-ready Kubernetes cluster deployed on
# OpenStack using Kubespray for cluster installation.
#
# Key Features:
# - High availability control plane (3 masters)
# - Calico CNI for pod networking
# - Cinder CSI for persistent storage
# - VRRP for control plane load balancing
# - Integrated secrets management with SOPS

schema_version: "2.0"

opencenter:
  # Meta Domain: Cluster identity and organizational context
  meta:
    name: prod-k8s-cluster
    organization: acme-corp
    env: production
    region: sjc3
    status: active

  # Cluster Domain: Kubernetes-specific configuration (provider-agnostic)
  cluster:
    cluster_name: prod-k8s-cluster
    base_domain: acme-corp.com
    cluster_fqdn: prod-k8s-cluster.acme-corp.com
    admin_email: k8s-admin@acme-corp.com
    
    kubernetes:
      version: "1.28.5"
      api_port: 6443
      kube_vip_enabled: true
      subnet_pods: "10.233.64.0/18"
      subnet_services: "10.233.0.0/18"
      
      # CNI Plugin Selection (Calico)
      network_plugin:
        calico:
          enabled: true
          ipip_mode: "Always"
          vxlan_mode: "Never"
          network_backend: "bird"
          mtu: 1450
      
      # CSI Plugin Selection (Cinder for OpenStack)
      storage_plugin:
        cinder_csi:
          enabled: true
          version: "v1.28.0"
      
      security:
        pod_security_policy_enabled: false
        audit_log_enabled: true
        encryption_at_rest_enabled: true
      
      oidc:
        enabled: true
        issuer_url: "https://keycloak.acme-corp.com/realms/kubernetes"
        client_id: "kubernetes"
        username_claim: "preferred_username"
        groups_claim: "groups"

  # Infrastructure Domain: Physical resources and provider configuration
  infrastructure:
    provider: openstack
    os_version: "ubuntu-22.04"
    
    # SSH Configuration
    ssh:
      user: ubuntu
      key_path: "~/.ssh/prod-k8s-cluster-sjc3"
      bastion_enabled: true
    
    # Networking Configuration (Infrastructure-level)
    networking:
      subnet_nodes: "10.2.128.0/22"
      allocation_pool_start: "10.2.128.10"
      allocation_pool_end: "10.2.131.254"
      vrrp_ip: "10.2.128.5"
      vrrp_enabled: true
      use_octavia: true
      loadbalancer_provider: "octavia"
      use_designate: true
      dns_zone_name: "acme-corp.com"
      dns_nameservers:
        - "8.8.8.8"
        - "8.8.4.4"
      ntp_servers:
        - "time.google.com"
        - "time.cloudflare.com"
    
    # Compute Configuration
    compute:
      flavor_bastion: "m1.small"
      flavor_master: "m1.large"
      flavor_worker: "m1.xlarge"
      master_count: 3
      worker_count: 5
    
    # Storage Configuration
    storage:
      default_storage_class: "cinder-csi"
      worker_volume_size: 100
      worker_volume_destination_type: "volume"
      worker_volume_source_type: "image"
      worker_volume_type: "ssd"
      worker_volume_delete_on_termination: true
      master_volume_size: 50
      master_volume_destination_type: "volume"
      master_volume_source_type: "image"
      master_volume_type: "ssd"
      master_volume_delete_on_termination: true
      
      # Additional block devices for worker nodes
      additional_block_devices:
        - device_name: "/dev/vdb"
          volume_size: 500
          volume_type: "ssd"
          delete_on_termination: true
    
    # Provider-Specific Configuration (OpenStack)
    cloud:
      openstack:
        auth_url: "https://openstack.sjc3.acme-corp.com:5000/v3"
        project_name: "kubernetes-prod"
        domain_name: "Default"
        region: "sjc3"
        availability_zones:
          - "az1"
          - "az2"
          - "az3"
        network_name: "k8s-network"
        external_network_name: "public"
        image_id: "${secrets.openstack.ubuntu_2204_image_id}"
        flavor_validation_enabled: true

  # Services Domain: Platform workloads
  services:
    # FluxCD for GitOps
    fluxcd:
      enabled: true
      version: "v2.2.0"
      namespace: "flux-system"
    
    # Cert-Manager with Designate DNS
    cert-manager:
      enabled: true
      version: "v1.13.0"
      namespace: "cert-manager"
      dns_provider: "designate"
      designate_config:
        auth_url: "${infrastructure.cloud.openstack.auth_url}"
        region: "${infrastructure.cloud.openstack.region}"
    
    # Cinder CSI Driver
    cinder-csi:
      enabled: true
      version: "v1.28.0"
      namespace: "kube-system"
      storage_classes:
        - name: "cinder-csi"
          is_default: true
          volume_type: "ssd"
          reclaim_policy: "Delete"
    
    # Monitoring Stack
    kube-prometheus-stack:
      enabled: true
      version: "v0.70.0"
      namespace: "monitoring"
      grafana_enabled: true
      prometheus_retention: "30d"
    
    # Logging Stack
    loki:
      enabled: true
      version: "v2.9.0"
      namespace: "logging"
      storage_type: "swift"
      swift_config:
        auth_url: "${infrastructure.cloud.openstack.auth_url}"
        container_name: "loki-chunks"
        region: "${infrastructure.cloud.openstack.region}"

# Deployment Configuration: How Kubernetes is installed
deployment:
  auto_deploy: true
  method: kubespray
  
  kubespray:
    version: "v2.24.0"
    modules:
      dns_mode: "coredns"
      container_runtime: "containerd"
      etcd_deployment_type: "host"

# GitOps Configuration
gitops:
  enabled: true
  git_url: "git@github.com:acme-corp/k8s-gitops.git"
  git_branch: "main"
  base_repo_url: "https://github.com/rackerlabs/openCenter-gitops-base.git"
  base_repo_release: "v1.0.0"
  flux_interval: "5m"
  flux_prune: true

# OpenTofu Backend Configuration
opentofu:
  enabled: true
  backend_type: "s3"
  s3_config:
    bucket: "acme-corp-terraform-state"
    key: "kubernetes/prod-k8s-cluster/terraform.tfstate"
    region: "us-east-1"
    encrypt: true

# Secrets Configuration
secrets:
  sops:
    enabled: true
    age_key_file: "~/.config/opencenter/clusters/acme-corp/secrets/age/prod-k8s-cluster-key.txt"
  
  # Global infrastructure secrets
  openstack:
    username: "ENC[AES256_GCM,data:...]"
    password: "ENC[AES256_GCM,data:...]"
    ubuntu_2204_image_id: "ENC[AES256_GCM,data:...]"
  
  # Service-specific secrets
  cert_manager:
    designate_username: "ENC[AES256_GCM,data:...]"
    designate_password: "ENC[AES256_GCM,data:...]"
  
  loki:
    swift_username: "ENC[AES256_GCM,data:...]"
    swift_password: "ENC[AES256_GCM,data:...]"
