  subnet_pods: 10.42.0.0/16
  subnet_services: 10.43.0.0/16
  allocation_pool_start: 10.2.128.50
  allocation_pool_end: 10.2.131.254
  vrrp_enabled: true
  vrrp_ip: 10.2.128.10
  use_octavia: false
  use_designate: false
  dns_zone_name: gdo.prod.sjc3.k8s.opencenter.cloud
  dns_nameservers:
    - 1.1.1.1
    - 8.8.8.8
  ntp_servers:
    - time.dfw3.rackspace.com
    - time2.dfw3.rackspace.com
  loadbalancer_provider: amphora
  vlan:
    id: ""
    mtu: 0
    provider: physnet1

deployment:
  auto_deploy: true

secrets:
  sops_age_key_file: ~/.config/openCenter/clusters/gdo/secrets/age/gdo.prod.sjc3-key.txt
  ssh_key:
    private: ~/.config/openCenter/clusters/gdo/secrets/ssh/gdo.prod.sjc3-prod-sjc3
