schema_version: "1.0"

opencenter:
  meta:
    organization: 1643323-Federal-Farm-Credit
    name: k8s-dev
    env: dev
    region: iad3
    status: active

  cluster:
    cluster_name: k8s-dev
    base_domain: k8s.opencenter.cloud
    admin_email: admin@farmcreditfunding.com
    
    kubernetes:
      # Kubernetes version configuration
      version: 1.32.8
      kubespray_version: v2.28.1
      
      # Node counts
      master_count: 3
      worker_count: 3
      worker_count_windows: 0
      
      # DNS configuration
      dns_zone_name: k8s-dev.farmcreditfunding.com
      
      # Network configuration
      subnet_pods: 10.42.0.0/16
      subnet_services: 10.43.0.0/16
      
      # Load balancer
      loadbalancer_provider: ovn
      
      # API configuration
      k8s_api_port: 443
      k8s_api_ip: 69.20.5.174
      
      # SSH configuration
      ssh_user: ubuntu
      ssh_key_path: /etc/openCenter/1643323-Federal-Farm-Credit/secrets/ssh/k8s-dev-svc01m.iad3-1369839.sddc.rackspace-cloud.com-iad3
      
      # Bastion configuration
      address_bastion: 69.20.5.172
      
      # Deployment settings
      deploy_cluster: true
      
      # Kube-vip settings
      kube_vip_enabled: true
      
      # Hardening settings
      k8s_hardening_enabled: true
      kube_pod_security_exemptions_namespaces:
        - trivy-temp
        - two
        - three
      kubelet_rotate_server_certificates: false
      os_hardening_enabled: true
      
      # Windows dataplane
      windows_dataplane: Disabled
      
      # Networking configuration (VRRP, subnets, etc.)
      networking:
        subnet_nodes: 172.23.0.0/24
        vrrp_enabled: true
        vrrp_ip: 172.23.0.5
        use_octavia: false
      
      # Network plugin configuration
      network_plugin:
        calico:
          enabled: true
          cni_iface: ens192
          calico_interface_autodetect: interface
          calico_interface_autodetect_cidr: ""
          encapsulation_type: VXLAN
          nat_outgoing: true
        cilium:
          enabled: false
        kube-ovn:
          enabled: false
      
      # OIDC configuration
      oidc:
        enabled: true
        kube_oidc_url: https://auth.fcc.k8s-dev.iad3.k8s.opencenter.cloud/realms/opencenter
        kube_oidc_client_id: opencenter
        kube_oidc_ca_file: /etc/ssl/certs/ca-certificates.crt
        kube_oidc_username_claim: preferred_username
        kube_oidc_username_prefix: "oidc:"
        kube_oidc_groups_claim: groups
        kube_oidc_groups_prefix: "oidc:"
      
      # Baremetal node definitions (matching Terraform)
      master_nodes:
        - id: master-0
          name: k8s-dev-iad3-cp0
          access_ip_v4: 172.23.0.11
        - id: master-1
          name: k8s-dev-iad3-cp1
          access_ip_v4: 172.23.0.12
        - id: master-2
          name: k8s-dev-iad3-cp2
          access_ip_v4: 172.23.0.13
      
      worker_nodes:
        - id: worker-0
          name: k8s-dev-iad3-wn0
          access_ip_v4: 172.23.0.14
        - id: worker-1
          name: k8s-dev-iad3-wn1
          access_ip_v4: 172.23.0.15
        - id: worker-2
          name: k8s-dev-iad3-wn2
          access_ip_v4: 172.23.0.16

  infrastructure:
    provider: baremetal
    
    cloud:
      openstack:
        region: iad3
        domain: Default

  gitops:
    git_dir: ~/.config/openCenter/clusters/1643323-Federal-Farm-Credit/gitops
    git_branch: main
    gitops_base_repo: ssh://git@github.com/rackerlabs/openCenter-gitops-base.git
    gitops_branch: main
    gitops_base_release: v0.1.0

  services:
    calico:
      enabled: true
      release: v3.28.0

secrets:
  ssh_key:
    cypher: ed25519
